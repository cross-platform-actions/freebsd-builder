name: Build VM Disk Image

on:
  push:
    branches:
      - '*'
    tags:
      - 'v*'
  pull_request:
    branches:
      - master

jobs:
  build:
    name: ${{ matrix.version }} ${{ matrix.architecture.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        expected_hostname: [runnervmg1sw1.local]
        version:
          - '12.2'
          - '13.0'
          - '13.1'
          - '13.2'
          - '13.3'
          - '13.4'
          - '13.5'
          - '14.0'
          - '14.1'
          - '14.2'
          - '14.3'
          - '14.4'
          - '15.0'
          - '15.1'

        architecture:
          - name: x86-64
            qemu: x86
            uname: amd64

          - name: arm64
            qemu: aarch64

        exclude:
          - version: '12.2'
            architecture:
              name: arm64
              qemu: aarch64

        include:
          - version: '12.4'
            copy_from_previous_release: true
            expected_hostname: ''
            architecture:
              name: arm64
              qemu: aarch64

          - version: '12.4'
            expected_hostname: runnervmg1sw1.local
            architecture:
              name: x86-64
              qemu: x86
              uname: amd64

    steps:
      - name: Clone Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Dependencies
        run: |
          sudo apt update && \
          sudo apt install -y \
          fdisk \
          dosfstools \
          rsync \
          curl \
          python3 \
          qemu-system-${{ matrix.architecture.qemu }}

          if [ -f /usr/share/qemu-efi-aarch64/QEMU_EFI.fd ]; then
            sudo ln -s /usr/share/qemu-efi-aarch64/QEMU_EFI.fd /usr/share/qemu/edk2-aarch64-code.fd
          fi

      - uses: hashicorp/setup-packer@3286471d6cc6756d056a0b199fea5e0becdbc189 # v3.3.0
        with:
          version: "1.9.1"

      # - name: Setup tmate session
      #   uses: mxschmitt/action-tmate@v3
      #   with:
      #     limit-access-to-actor: true

      - name: Build Image
        if: '!matrix.copy_from_previous_release'
        env:
          PACKER_LOG: 1
        run: |
          ./build.sh '${{ matrix.version }}' '${{ matrix.architecture.name }}' \
            -var 'headless=true'

      - name: Copy from previous release
        if: matrix.copy_from_previous_release
        run: |
          curl -O -L \
            --retry 3 \
            --create-dirs \
            --output-dir output \
            https://github.com/cross-platform-actions/freebsd-builder/releases/download/v0.5.0/freebsd-${{ matrix.version }}-${{ matrix.architecture.name }}.qcow2

      - name: Start Local HTTP Server
        run: python3 -m http.server 8080 --directory output &

      - name: Create File
        run: echo 'host to guest' > host_to_guest.txt

      - name: Test Image
        uses: cross-platform-actions/action@master
        with:
          operating_system: freebsd
          architecture: ${{ matrix.architecture.name }}
          version: '${{ matrix.version }}'
          image_url: http://localhost:8080/freebsd-${{ matrix.version }}-${{ matrix.architecture.name }}.qcow2
          shutdown_vm: false
          shell: bash
          run: |
            set -x
            echo "uname -a = $(uname -a)"
            echo "uname -s = $(uname -s)"
            echo "uname -r = $(uname -r)"
            echo "uname -v = $(uname -v)"
            echo "uname -m = $(uname -m)"
            echo "uname -p = $(uname -p)"
            pwd
            echo $SHELL
            hostname -f
            ls -lah
            whoami
            env | sort
            [ "`uname -s`" = 'FreeBSD' ]
            [ "`uname -r`" = '${{ matrix.version}}-RELEASE' ]
            [ "`uname -m`" = '${{ matrix.architecture.uname || matrix.architecture.name }}' ]
            [ "`pwd`" = '/home/runner/work/freebsd-builder/freebsd-builder' ] || [ "`pwd`" = '/usr/home/runner/work/freebsd-builder/freebsd-builder' ]
            [ "`hostname -f`" = '${{ matrix.expected_hostname }}' ]
            cat host_to_guest.txt | grep -q 'host to guest'
            echo 'guest to host' > guest_to_host.txt

      - name: Verify File Synchronization
        run: cat guest_to_host.txt | grep -q 'guest to host'

      - name: Create Release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          github_ref_name: ${{ github.ref_name }}
        run: |
          version="${github_ref_name#v}"

          # Matrix jobs run in parallel; the first to arrive creates the
          # draft release, the rest upload their artifacts to it.
          # (gh release create with --draft does not deduplicate by tag.)
          if gh release view "$github_ref_name" >/dev/null 2>&1; then
            gh release upload "$github_ref_name" output/* --clobber
          else
            sed -n "/^## \[${version}\]/,/^## \[/{/^## \[${version}\]/d;/^## \[/d;p;}" changelog.md \
              | gh release create \
                "$github_ref_name" \
                --title "FreeBSD ${version}" \
                --draft \
                --notes-file - \
                output/*
          fi
